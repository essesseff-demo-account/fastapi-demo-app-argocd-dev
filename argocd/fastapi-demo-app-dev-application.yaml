apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-demo-app-dev
  namespace: argocd
  labels:
    app: fastapi-demo-app
    environment: dev
    essesseff: "true"
    configenvrepoid: "1199028553"
spec:
  project: default
  source:
    repoURL: https://github.com/essesseff-demo-account/fastapi-demo-app-config-dev
    targetRevision: main
    path: .
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: essesseff-demo-account
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
  info:
    - name: fastapi-demo-app
      value: "fastapi-demo-app GitOps deployment managed by essesseff"
    - name: environment
      value: "dev"
      
